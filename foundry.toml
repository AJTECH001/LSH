[profile.default]
src = "src"
out = "out"
libs = ["lib"]
bytecode_hash = "none"
evm_version = "cancun"
ffi = true
fs_permissions = [{access = "read-write", path = ".forge-snapshots/"}]
solc_version = "0.8.26"
via_ir = true

[profile.ci]
src = "src"
out = "out"
libs = ["lib"]

[profile.lint]
exclude_lints = ["screaming-snake-case-immutable", "screaming-snake-case-const"]
lint_on_build = false

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
